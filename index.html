<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spirit Ivory</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; color: #ccc; font-family: ui-monospace, Menlo, monospace; }
    #canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
    #hud { position: fixed; top: 10px; left: 12px; font-size: 11px; opacity: 0.55; pointer-events: none; mix-blend-mode: screen; }
    #hud b { font-weight: 600; color: #fff; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hud">
    <div><b>spirit ivory</b></div>
    <div id="stats" style="margin-top:4px;opacity:0.7"></div>
    <div style="margin-top:8px;opacity:0.5">joystick to walk · hold forward to run · right-drag to look</div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
